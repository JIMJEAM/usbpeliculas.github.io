<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- No-referrer: bypassa hotlink protection / bloqueos por Referer -->
    <meta name="referrer" content="no-referrer">
    <!-- Fuerza HTTPS en recursos HTTP (mixed content) -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Player Universal</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; font-family: system-ui, sans-serif;
        }
        video { width: 100%; height: 100%; max-height: 100vh; outline: none; }
        #loader {
            position: absolute;
            border: 3px solid #333; border-top: 3px solid #f59e0b;
            border-radius: 50%; width: 44px; height: 44px;
            animation: spin 0.9s linear infinite; z-index: 5;
        }
        #statusMsg {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(0,0,0,0.82); color: #e5e7eb;
            padding: 8px 18px; border-radius: 6px; font-size: 0.82rem;
            text-align: center; max-width: 90%; display: none;
            border-left: 3px solid #f59e0b;
        }
        #statusMsg.error { border-left-color: #f87171; color: #fca5a5; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader"></div>
    <div id="statusMsg"></div>
    <video id="video" controls autoplay playsinline crossorigin="anonymous"></video>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <script>
    (function () {
        const params  = new URLSearchParams(window.location.search);
        let   src     = params.get('src');
        const video   = document.getElementById('video');
        const loader  = document.getElementById('loader');
        const statusEl = document.getElementById('statusMsg');

        function showStatus(msg, isError) {
            statusEl.textContent = msg;
            statusEl.className   = isError ? 'error' : '';
            statusEl.style.display = 'block';
        }
        function hideStatus() { statusEl.style.display = 'none'; }
        function hideLoader()  { loader.style.display  = 'none'; }

        if (!src) {
            hideLoader();
            showStatus('⚠️ No se proporcionó URL de stream (?src=...)', true);
            return;
        }

        // Normalizar URL: tokens Pluto/SSAI
        src = src
            .replace(/\{PSID\}/g,        () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2))
            .replace(/\{APP_DOMAIN\}/g,  'web')
            .replace(/\{APP_NAME\}/g,    'web')
            .replace(/\{TARGETOPT\}/g,   '0')
            .replace(/\%7BPSID%7D/gi,    () => Math.random().toString(36).slice(2))
            .replace(/\%7BAPP_DOMAIN%7D/gi, 'web')
            .replace(/\%7BAPP_NAME%7D/gi,   'web')
            .replace(/\%7BTARGETOPT%7D/gi,  '0');

        // Cadena de proxies — se intenta en orden hasta reproducir
        const PROXY_CHAIN = [
            null,                                                                           // 1. directo (no-referrer)
            url => '/proxy.php?url='              + encodeURIComponent(url),               // 2. proxy propio PHP ⭐
            url => 'https://corsproxy.io/?'       + encodeURIComponent(url),               // 3. corsproxy.io
            url => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(url),  // 4. codetabs
            url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),        // 5. allorigins
        ];

        let proxyIdx  = 0;
        let hlsInst   = null;
        let succeeded = false;

        function tryPlay(proxyFn) {
            const finalUrl = proxyFn ? proxyFn(src) : src;
            const label    = proxyFn ? '🔄 Proxy ' + proxyIdx : '▶ Directo';
            showStatus(label + ' — conectando...');

            if (hlsInst) { hlsInst.destroy(); hlsInst = null; }

            const isHls = /\.m3u8|m3u8/i.test(src) || /\.m3u(?!8)/i.test(src);
            const isMp4 = /\.mp4|\.ts|\.webm|\.mkv/i.test(src);

            if (!isHls && isMp4) {
                // Archivo directo — HTML5 nativo
                video.src = finalUrl;
                video.oncanplay  = () => { hideLoader(); hideStatus(); succeeded = true; };
                video.onerror    = () => nextProxy();
                video.play().catch(() => {});
                return;
            }

            // HLS
            if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                const cfg = {
                    enableWorker: true,
                    manifestLoadingTimeOut: 12000,
                    manifestLoadingMaxRetry: 1,
                    levelLoadingTimeOut: 12000,
                    // No enviar Referer — bypassa hotlink/CDN que bloquean por origen
                    xhrSetup: function (xhr, reqUrl) {
                        xhr.referrerPolicy = 'no-referrer';
                        if (proxyFn &&
                            !reqUrl.includes('corsproxy') &&
                            !reqUrl.includes('codetabs') &&
                            !reqUrl.includes('allorigins')) {
                            xhr.open('GET', proxyFn(reqUrl), true);
                        }
                    },
                    fetchSetup: function (ctx, initParams) {
                        initParams.referrerPolicy = 'no-referrer';
                        return new Request(ctx.url, initParams);
                    }
                };
                hlsInst = new Hls(cfg);
                hlsInst.loadSource(finalUrl);
                hlsInst.attachMedia(video);

                hlsInst.on(Hls.Events.MANIFEST_PARSED, () => {
                    succeeded = true;
                    hideLoader(); hideStatus();
                    video.play().catch(() => {});
                });

                hlsInst.on(Hls.Events.ERROR, (_, data) => {
                    if (!data.fatal) return;
                    if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        hlsInst.recoverMediaError(); return;
                    }
                    nextProxy();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari nativo
                video.src = finalUrl;
                video.onloadedmetadata = () => { hideLoader(); hideStatus(); video.play(); };
                video.onerror          = () => nextProxy();
            } else {
                video.src = finalUrl;
                video.play().catch(() => {});
            }
        }

        function nextProxy() {
            proxyIdx++;
            if (proxyIdx >= PROXY_CHAIN.length) {
                hideLoader();
                showStatus('❌ Stream no disponible — el canal puede estar offline, geo-restringido o requiere proxy de servidor.', true);
                return;
            }
            tryPlay(PROXY_CHAIN[proxyIdx]);
        }

        // Escuchar evento de ready de video para ocultar loader
        video.addEventListener('playing', () => { hideLoader(); hideStatus(); }, { once: true });

        tryPlay(PROXY_CHAIN[0]);
    })();
    </script>
</body>
</html>
